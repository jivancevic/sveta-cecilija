name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Match production (Coolify/Nixpacks runs Node 22). npm ci here will
          # surface lockfile/platform skew the same way the deploy would.
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
